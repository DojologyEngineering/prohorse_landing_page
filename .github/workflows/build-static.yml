name: Build and Upload Next.js Static (ZIP)

on:
  push:
    branches:
      - 'release/*'
  pull_request:
    branches:
      - 'release/*'
  workflow_dispatch:

jobs:
  build-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build static export
        run: pnpm build

      - name: Zip static output
        run: |
          cd out
          zip -r ../nextjs-static-${{ github.sha }}.zip .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-static-${{ github.sha }}
          path: nextjs-static-${{ github.sha }}.zip